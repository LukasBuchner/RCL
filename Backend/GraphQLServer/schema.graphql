    some: AgentFilterInput @cost(weight: "10")
    any: Boolean @cost(weight: "10")
}

input ListFilterInputTypeOfPropertyFilterInput {
    all: PropertyFilterInput @cost(weight: "10")
    none: PropertyFilterInput @cost(weight: "10")
    some: PropertyFilterInput @cost(weight: "10")
    any: Boolean @cost(weight: "10")
}

