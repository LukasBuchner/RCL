}

input DeleteDependencyEdgeInput {
    id: UUID!
}

input DeleteNodeInput {
    id: UUID!
}

input DeletePositionTagInput {
    id: UUID!
}

input DeleteSceneObjectInput {
    id: UUID!
}

input DeleteSkillInput {
    id: UUID!
}

