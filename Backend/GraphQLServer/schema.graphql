"Represents a procedure with its nodes, edges, and variables."
type Procedure {
    id: UUID!
    name: String!
    description: String
    createdAtUtc: DateTime!
    lastUpdatedAtUtc: DateTime!
    rootNodeIds: [UUID!]!
    variables: [VariableDefinition!]!
    isLoaded: Boolean!
    lastLoadedUtc: DateTime
}

"Definition of a variable in a procedure."
type VariableDefinition {
    name: String!
    type: ValueType!
    defaultValue: String
    scope: VariableScope!
    source: VariableSource!
    description: String
    isReadOnly: Boolean!
}

"Input for creating or updating a variable definition."
input VariableDefinitionInput {
    name: String!
    type: ValueTypeInput!
    defaultValue: String
    scope: VariableScope = PROCEDURE
    source: VariableSource = USER_DEFINED
    description: String
    isReadOnly: Boolean = false
}

"Scope level where a variable is accessible."
enum VariableScope {
    PROCEDURE
    TASK
    GLOBAL
}

"Source of a variable's value."
enum VariableSource {
    USER_DEFINED
    SKILL_OUTPUT
    AGENT_STATE
    SENSOR_DATA
    RUNTIME_COMPUTED
}

"Base type for all value types."
union ValueType = BooleanType | NumberType | StringType | PositionType | PositionTagType | SceneObjectType | EnumType | ListType

"Boolean value type."
type BooleanType {
    typeName: String!
}

"Number value type."
type NumberType {
    typeName: String!
}

"String value type."
type StringType {
    typeName: String!
}

"Position value type."
type PositionType {
    typeName: String!
}

"Position tag value type."
type PositionTagType {
    typeName: String!
}

"Scene object value type."
type SceneObjectType {
    typeName: String!
}

"Enum value type with allowed values."
type EnumType {
    typeName: String!
    allowedValues: [String!]!
}

"List value type."
type ListType {
    typeName: String!
    elementType: ValueType!
}

"Input for value types."
input ValueTypeInput @oneOf {
    boolean: BooleanValueTypeInput
    number: NumberValueTypeInput
    string: StringValueTypeInput
    position: PositionValueTypeInput
    positionTag: PositionTagValueTypeInput
    sceneObject: SceneObjectValueTypeInput
    enum: EnumValueTypeInput
    list: ListValueTypeInput
}

